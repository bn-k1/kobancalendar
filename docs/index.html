<!doctype html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="交番表に基づいた勤務スケジュールを自動生成・管理するためのツール"/><title>KobanCalendar - 交番カレンダー</title><link rel="icon" href="favicon.ico" type="image/x-icon"/><script defer="defer" src="bundle.js"></script><link href="css/main.css" rel="stylesheet"></head><body><header><h1>交番カレンダー</h1></header><main><div class="controls"><fieldset id="baseDateSection" class="control-group hidden"><legend>基準日</legend><div class="form-group"><select id="baseDate" aria-label="基準日を選択"></select></div></fieldset><fieldset id="startNumberSection" class="control-group hidden"><legend>コマ位置</legend><div class="form-group"><select id="startNumber" aria-label="コマ位置を選択"></select></div></fieldset></div><div id="calendar" aria-label="勤務スケジュールカレンダー"></div><fieldset id="exportSection" class="control-group hidden"><legend>エクスポート</legend><div class="form-group"><span id="exportLabelPostBaseDate" class="hidden">今日から</span> <span id="exportLabelPreBaseDate" class="hidden">基準日から</span> <select id="exportMonths" aria-label="エクスポート期間を選択"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="12">12</option><option value="24">24</option></select> <span>ヶ月分のデータを</span> <button id="exportButton" aria-label="ICSをダウンロード">ダウンロード</button></div></fieldset></main><footer><p>KobanCalendar - <a href="https://github.com/bn-k1/kobancalendar#README" target="_blank" rel="noopener noreferrer">GitHub</a></p></footer></body></html>
