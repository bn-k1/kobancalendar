<!doctype html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="交番表に基づいて飲み会などの調整をするためのツール"/><title>KobanCalendar - 飲みに行くンダー</title><link rel="icon" href="favicon.ico" type="image/x-icon"/><script defer="defer" src="js/meetup.bundle.js"></script><link href="css/meetup.css" rel="stylesheet"></head><body><div x-data="meetupFinder"><header><h1>飲みに行くンダー🍻</h1></header><main><div class="controls"><fieldset id="baseDateSection" class="control-group" x-show="isLoaded" x-cloak><legend>基準日</legend><div class="form-group"><select id="baseDate" aria-label="基準日を選択" x-model="selectedBaseDate" @change="handleBaseDateChange()"><template x-for="date in baseDates" :key="date.format('YYYY-MM-DD')"><option :value="date.format('YYYY-MM-DD')" x-text="date.format('YYYY-MM-DD')"></option></template></select></div></fieldset><fieldset id="meetupSettingsSection" class="control-group" x-show="isLoaded" x-cloak><legend>検索条件</legend><div class="form-group"><label for="meetupStartTime">飲会開始:</label> <select id="meetupStartTime" aria-label="飲み会開始時間" x-model="meetupStartTime"><option value="12:00">12:00</option><option value="13:00">13:00</option><option value="14:00">14:00</option><option value="15:00">15:00</option><option value="16:00">16:00</option><option value="17:00">17:00</option><option value="18:00">18:00</option><option value="19:00">19:00</option><option value="20:00">20:00</option><option value="21:00">21:00</option></select></div><div class="form-group"><label for="searchPeriod">検索期間:</label> <select id="searchPeriod" aria-label="検索期間" x-model="searchPeriod"><option value="30">1ヶ月</option><option value="60">2ヶ月</option><option value="90">3ヶ月</option><option value="120">4ヶ月</option><option value="150">5ヶ月</option><option value="180">6ヶ月</option></select></div></fieldset><fieldset id="participantsSection" class="control-group" x-show="isLoaded" x-cloak><legend>参加者(コマ位置)</legend><div id="participantsList"><template x-for="(participant, index) in participants" :key="index"><div class="participant-entry"><select class="participant-position" aria-label="参加者のコマ位置" x-model="participant.position"><option value="" disabled="disabled">コマ位置を選択</option><template x-for="i in rotationCycleLength" :key="i"><option :value="i" x-text="i"></option></template></select> <button class="remove-participant" aria-label="この参加者を削除" @click="removeParticipant(index)">✕</button></div></template></div><button id="addParticipantBtn" class="primary-btn" @click="addParticipant()">参加者を追加</button></fieldset><button id="findDatesBtn" class="primary-btn action-btn" x-show="isLoaded" x-cloak @click="findDates()">日程を検索</button></div><div id="results" class="results" x-show="showResults" x-cloak><h2>検索結果</h2><div class="results-tabs"><button id="allMatchesTab" class="tab-btn" :class="{'active': activeTab === 'all'}" @click="activeTab = 'all'" data-matches="all">全員一致</button> <button id="partialMatchesTab" class="tab-btn" :class="{'active': activeTab === 'partial'}" @click="activeTab = 'partial'" data-matches="partial">部分一致</button></div><div id="resultsContent"><div id="allMatchesContent" class="tab-content" :class="{'active': activeTab === 'all'}"><div class="no-results-message" x-show="results.allMatches.length === 0">全員が参加可能な日付は見つかりませんでした。</div><table id="allMatchesTable" class="results-table" x-show="results.allMatches.length > 0"><thead><tr><th>日付</th><th>曜日</th><th>参加可能人数</th><th>詳細</th></tr></thead><tbody><template x-for="match in results.allMatches" :key="match.date.format('YYYY-MM-DD')"><tr><td x-text="match.date.format('YYYY/MM/DD')"></td><td :class="getDayClass(match.date)" x-text="getWeekday(match.date)"></td><td x-text="`${match.availableCount}/${match.totalCount}`"></td><td><button class="view-details" @click="showDetails(match)">詳細</button></td></tr></template></tbody></table></div><div id="partialMatchesContent" class="tab-content" :class="{'active': activeTab === 'partial'}"><div class="no-results-message" x-show="results.partialMatches.length === 0">条件に合う日付は見つかりませんでした。</div><table id="partialMatchesTable" class="results-table" x-show="results.partialMatches.length > 0"><thead><tr><th>日付</th><th>曜日</th><th>参加可能人数</th><th>詳細</th></tr></thead><tbody><template x-for="match in results.partialMatches" :key="match.date.format('YYYY-MM-DD')"><tr><td x-text="match.date.format('YYYY/MM/DD')"></td><td :class="getDayClass(match.date)" x-text="getWeekday(match.date)"></td><td x-text="`${match.availableCount}/${match.totalCount}`"></td><td><button class="view-details" @click="showDetails(match)">詳細</button></td></tr></template></tbody></table></div></div></div><div id="detailsModal" class="modal" :class="{'hidden': !showModal}" x-cloak @click="closeModalOnOutsideClick"><div class="modal-content"><span class="close-modal" @click="showModal = false">&times;</span><h3 id="modalDate" x-text="modalTitle">日付詳細</h3><table id="detailsTable" class="details-table"><thead><tr><th>コマ位置</th><th>勤務内容</th><th>時間</th><th>翌日</th><th>参加可否</th></tr></thead><tbody><template x-if="currentDetails && currentDetails.details"><template x-for="detail in currentDetails.details" :key="detail.position"><tr><td x-text="detail.position"></td><td x-text="detail.schedule?.subject || '-'"></td><td x-text="getTimeDisplay(detail)"></td><td x-text="getNextDayShift(detail)"></td><td :class="detail.isAvailable ? 'availability-yes' : 'availability-no'" x-text="detail.isAvailable ? '○' : '×'"></td></tr></template></template></tbody></table></div></div></main><footer><p>KobanCalendar - <a href="https://github.com/bn-k1/kobancalendar#README" target="_blank" rel="noopener noreferrer">GitHub </a>- <a href="index.html">🚨</a></p></footer></div></body></html>
