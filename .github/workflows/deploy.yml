name: Deploy to GitHub Pages

# Build and publish the site on every push to main. Generated bundles
# (data/scheduleData.json, data/menu/menu.json, docs/) are produced here, not
# committed — git only holds the source CSV/config the admin edits.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Generate bundles so the tests/build can import them.
      - run: npm run build-prep
      - run: npm test
      - name: Build (gh-pages)
        # Derive the base path from the repo name — a forked office needs zero
        # config. Override only for a custom domain via config.json `url`.
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build-gh-pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
