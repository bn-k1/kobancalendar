<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KobanCalendar</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="lib/fullcalendar/index.global.min.js"></script>
</head>
<body>
  <h1>交番カレンダー</h1>
  
  <div id="baseDateSection" class="hidden">
    <label for="baseDate">基準日:</label>
    <select id="baseDate"></select>
  </div>
  
  <div id="startNumberSection" class="hidden">
    <label for="startNumber">コマ位置:</label>
    <select id="startNumber"></select>
  </div>
  
  <br><br>
  <div id="calendar"></div>
  <br>
  
  <div id="exportSection" class="hidden">
    <label for="exportMonths">.csvファイル</label>
    <select id="exportMonths">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="12">12</option>
      <option value="24">24</option>
    </select>
    <span>ヶ月分を</span>
    <button id="exportButton">ダウンロード</button>
    <br>
    <a href="https://support.google.com/calendar/answer/37118" target="_blank" rel="noopener noreferrer">Googleカレンダーにインポートする方法</a>
  </div>
  
  <script type="module" src="js/main.js"></script>
</body>
</html>
